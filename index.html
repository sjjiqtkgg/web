<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>聚合直播 - 全平台版</title>
    <link rel="stylesheet" href="https://registry.npmmirror.com/artplayer/5/files/dist/artplayer.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #ccc; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; font-size: 13px; line-height: 1.5; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    #bar { display: flex; align-items: center; gap: 8px; padding: 0 12px; height: 48px; background: #0a0a0a; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; }
    #url { flex: 1; background: #1e1e1e; border: 1px solid #333; border-radius: 6px; padding: 8px 12px; color: #eee; font-size: 14px; outline: none; }
    #url:focus { border-color: #f5a623; }
    button { background: #2a2a2a; border: 1px solid #444; border-radius: 6px; padding: 6px 14px; color: #ddd; font-size: 13px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    button:hover { background: #3a3a3a; border-color: #f5a623; color: #f5a623; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .fav-on { color: #f5a623 !important; border-color: #f5a623 !important; }
    .bar-tab { background: transparent; border: none; border-bottom: 2px solid transparent; border-radius: 0; padding: 0 12px; height: 48px; line-height: 48px; font-size: 14px; }
    .bar-tab.active { color: #f5a623; border-bottom-color: #f5a623; }
    #main { flex: 1; display: flex; min-height: 0; }
    /* 播放器容器：使用 flex 居中，留出上下黑边 */
    #player-container {
        flex: 1;
        background: #000;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    /* 播放器本体：固定 16:9 比例，不超出容器 */
    #player {
        width: 100%;
        max-width: 100%;
        max-height: 100%;
        aspect-ratio: 16 / 9;
    }
    /* 确保 ArtPlayer 内部也填满 */
    .artplayer {
        width: 100% !important;
        height: 100% !important;
    }
    #chat-panel { width: 320px; background: #0f0f0f; border-left: 1px solid #222; display: flex; flex-direction: column; flex-shrink: 0; }
    .chat-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #121212; border-bottom: 1px solid #2a2a2a; }
    .chat-header span { color: #f5a623; font-weight: 500; }
    .danmaku-switch { display: flex; align-items: center; gap: 8px; }
    .switch-icon { font-size: 18px; cursor: pointer; padding: 4px; border-radius: 4px; }
    .switch-icon:hover { background: #2a2a2a; }
    .chat-content { flex: 1; overflow-y: auto; padding: 8px; }
    .chat-messages { display: flex; flex-direction: column; gap: 6px; }
    .chat-msg { display: flex; align-items: baseline; gap: 8px; padding: 6px 4px; border-bottom: 1px solid #1e1e1e; font-size: 16px; }
    .chat-nick { color: #8bc34a; font-weight: 500; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chat-nick::after { content: ":"; margin-right: 4px; color: #aaa; }
    .chat-text { color: #ddd; word-break: break-word; }
    .empty-chat { text-align: center; color: #555; padding: 20px; font-style: italic; }
    .follow-list, .history-list { display: flex; flex-direction: column; gap: 6px; }
    .follow-item, .history-item { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 6px; cursor: pointer; background: #141414; transition: background 0.2s; }
    .follow-item:hover, .history-item:hover { background: #222; }
    .follow-avatar, .history-avatar { width: 32px; height: 32px; border-radius: 50%; background: #2a2a2a; object-fit: cover; flex-shrink: 0; }
    .follow-info, .history-info { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .follow-status { font-size: 11px; padding: 2px 6px; border-radius: 10px; background: #222; }
    .follow-status.online { color: #8bc34a; }
    .follow-status.offline { color: #f44336; }
    .follow-delete { color: #666; padding: 0 4px; font-size: 16px; }
    .follow-delete:hover { color: #f44336; }
    .history-time { font-size: 10px; color: #888; }
    @media (max-width: 700px) { #chat-panel { width: 260px; } .chat-nick { max-width: 70px; } }
</style>
</head>
<body>
<div id="bar">
    <input id="url" type="text" placeholder="虎牙/斗鱼/B站/抖音 直播间地址，或 .flv/.m3u8 直链" spellcheck="false">
    <button id="btn-play" onclick="window.go()">播放</button>
    <button id="btn-fav" onclick="window.toggleFollow()" title="关注">★</button>
    <button onclick="window.openOriginalUrl()" title="原网页">🔗</button>
    <button class="bar-tab active" data-tab="danmaku">📢 弹幕</button>
    <button class="bar-tab" data-tab="follow">★ 关注</button>
    <button class="bar-tab" data-tab="history">🕒 历史</button>
</div>
<div id="main">
    <div id="player-container">
        <div id="player-wrap">
            <div id="player"></div>
        </div>
    </div>
    <div id="chat-panel">
        <div class="chat-header">
            <span id="header-title">弹幕列表</span>
            <div class="danmaku-switch" id="danmaku-switch">
                <span class="switch-icon" id="dm-switch-icon" title="弹幕开关">🔊</span>
            </div>
            <button id="header-action" style="display:none;">刷新</button>
        </div>
        <div class="chat-content" id="chat-content">
            <div class="chat-messages" id="chat-messages">
                <div class="empty-chat">✨ 连接弹幕后消息显示在此处</div>
            </div>
            <div class="follow-list" id="follow-list" style="display:none;"></div>
            <div class="history-list" id="history-list" style="display:none;"></div>
        </div>
    </div>
</div>

<script src="https://registry.npmmirror.com/mpegts.js/1/files/dist/mpegts.js"></script>
<script src="https://registry.npmmirror.com/artplayer/5/files/dist/artplayer.js"></script>

<script>
    // ======================= 配置区域 =======================
    const API_BASE = 'https://live1-cxe9.onrender.com';

    // ========== 斗鱼 MD5 签名 ==========
    function ub98484234_md5(str) {
      function sa(x,y){var l=(x&0xFFFF)+(y&0xFFFF);return(((x>>16)+(y>>16)+(l>>16))<<16)|(l&0xFFFF)}
      function rl(n,c){return(n<<c)|(n>>>(32-c))}

      function ff(a,b,c,d,x,s,t){return cm((b&c)|((~b)&d),a,b,x,s,t)}
      function gg(a,b,c,d,x,s,t){return cm((b&d)|(c&(~d)),a,b,x,s,t)}
      function hh(a,b,c,d,x,s,t){return cm(b^c^d,a,b,x,s,t)}
      function ii(a,b,c,d,x,s,t){return cm(c^(b|(~d)),a,b,x,s,t)}
      function core(x,len){
        x[len>>5]|=0x80<<(len%32);x[(((len+64)>>>9)<<4)+14]=len;

        for(var i=0;i<x.length;i+=16){var oa=a,ob=b,oc=c,od=d;
          a=ff(a,b,c,d,x[i],7,-680876936);d=ff(d,a,b,c,x[i+1],12,-389564586);c=ff(c,d,a,b,x[i+2],17,606105819);b=ff(b,c,d,a,x[i+3],22,-1044525330);
          a=ff(a,b,c,d,x[i+4],7,-176418897);d=ff(d,a,b,c,x[i+5],12,1200080426);c=ff(c,d,a,b,x[i+6],17,-1473231341);b=ff(b,c,d,a,x[i+7],22,-45705983);
          a=ff(a,b,c,d,x[i+8],7,1770035416);d=ff(d,a,b,c,x[i+9],12,-1958414417);c=ff(c,d,a,b,x[i+10],17,-42063);b=ff(b,c,d,a,x[i+11],22,-1990404162);
          a=ff(a,b,c,d,x[i+12],7,1804603682);d=ff(d,a,b,c,x[i+13],12,-40341101);c=ff(c,d,a,b,x[i+14],17,-1502002290);b=ff(b,c,d,a,x[i+15],22,1236535329);
          a=gg(a,b,c,d,x[i+1],5,-165796510);d=gg(d,a,b,c,x[i+6],9,-1069501632);c=gg(c,d,a,b,x[i+11],14,643717713);b=gg(b,c,d,a,x[i],20,-373897302);
          a=gg(a,b,c,d,x[i+5],5,-701558691);d=gg(d,a,b,c,x[i+10],9,38016083);c=gg(c,d,a,b,x[i+15],14,-660478335);b=gg(b,c,d,a,x[i+4],20,-405537848);

          a=gg(a,b,c,d,x[i+13],5,-1444681467);d=gg(d,a,b,c,x[i+2],9,-51403784);c=gg(c,d,a,b,x[i+7],14,1735328473);b=gg(b,c,d,a,x[i+12],20,-1926607734);
          a=hh(a,b,c,d,x[i+5],4,-378558);d=hh(d,a,b,c,x[i+8],11,-2022574463);c=hh(c,d,a,b,x[i+11],16,1839030562);b=hh(b,c,d,a,x[i+14],23,-35309556);

          a=hh(a,b,c,d,x[i+13],4,681279174);d=hh(d,a,b,c,x[i],11,-358537222);c=hh(c,d,a,b,x[i+3],16,-722521979);b=hh(b,c,d,a,x[i+6],23,76029189);
          a=hh(a,b,c,d,x[i+9],4,-640364487);d=hh(d,a,b,c,x[i+12],11,-421815835);c=hh(c,d,a,b,x[i+15],16,530742520);b=hh(b,c,d,a,x[i+2],23,-995338651);
          a=ii(a,b,c,d,x[i],6,-198630844);d=ii(d,a,b,c,x[i+7],10,1126891415);c=ii(c,d,a,b,x[i+14],15,-1416354905);b=ii(b,c,d,a,x[i+5],21,-57434055);
          a=ii(a,b,c,d,x[i+12],6,1700485571);d=ii(d,a,b,c,x[i+3],10,-1894986606);c=ii(c,d,a,b,x[i+10],15,-1051523);b=ii(b,c,d,a,x[i+1],21,-2054922799);
          a=ii(a,b,c,d,x[i+8],6,1873313359);d=ii(d,a,b,c,x[i+15],10,-30611744);c=ii(c,d,a,b,x[i+6],15,-1560198380);b=ii(b,c,d,a,x[i+13],21,1309151649);
          a=ii(a,b,c,d,x[i+4],6,-145523070);d=ii(d,a,b,c,x[i+11],10,-1120210379);c=ii(c,d,a,b,x[i+2],15,718787259);b=ii(b,c,d,a,x[i+9],21,-343485551);

      function s2b(s){var b=[];for(var i=0;i<s.length*8;i+=8)b[i>>5]|=(s.charCodeAt(i/8)&0xFF)<<(i%32);return b}
      function b2h(b){var h='0123456789abcdef',s='';for(var i=0;i<b.length*4;i++)s+=h[(b[i>>2]>>((i%4)*8+4))&0xF]+h[(b[i>>2]>>((i%4)*8))&0xF];return s}
      var u=unescape(encodeURIComponent(str));
      return b2h(core(s2b(u),u.length*8));
    }

    // ========== 斗鱼：前端签名 + 获取所有 CDN ==========
    async function douyuSignAndPlay(roomId, crptext) {
        try {
            const did = 'a1f0b03c' + Math.random().toString(16).slice(2,10) +
                        Math.random().toString(16).slice(2,10) + '01';
            const tt  = String(Math.floor(Date.now() / 1000));
            const cryptoShim = 'var CryptoJS={MD5:function(s){' + ub98484234_md5.toString() +
                               ';return{toString:function(){return ub98484234_md5(s);}};},enc:{Hex:{}}};';
            const execCode = cryptoShim + crptext + '\n return ub98484234("' + roomId + '","' + did + '",' + tt + ');';
            const signParams = new Function(execCode)();
            if (!signParams) throw new Error('sign 为空');

            const proxyBase = `${API_BASE}/api/proxy?` + new URLSearchParams({
                url: `https://www.douyu.com/lapi/live/getH5Play/${roomId}`,
                referer: `https://www.douyu.com/${roomId}`
            });
            const r0 = await fetch(proxyBase, { method: 'POST', body: signParams + '&cdn=&rate=-1&ver=Douyu_223061205&iar=1&ive=1&hevc=0&fa=0' });
            const d0 = await r0.json();
            if (d0.error !== 0) throw new Error('斗鱼拉流: ' + (d0.msg || d0.error));

            let cdns = (d0.data.cdnsWithName || []).map(x => x.cdn).filter(x => x && !x.startsWith('scdn'));
            if (!cdns.length) cdns = ['tct-h5', 'ali-h5', 'hw-h5'];

            const cdnRank = c => {
                c = c.toLowerCase();
                if (c.includes('tct') || c.includes('tx')) return 0;
                if (c.includes('ali')) return 1;
                if (c.includes('hw')) return 2;
                return 3;
            };
            const sortedCdns = cdns.slice(0, 4).sort((a, b) => cdnRank(a) - cdnRank(b));

            const streams = [];
            for (const cdn of sortedCdns) {
                try {
                    const r = await fetch(proxyBase, { method: 'POST', body: signParams + `&cdn=${cdn}&rate=0` });
                    const d = await r.json();
                    if (d.error === 0 && d.data && d.data.rtmp_url) {
                        const url = d.data.rtmp_url + '/' + d.data.rtmp_live.replace(/&amp;/g, '&');
                        const label = cdn.includes('tct') ? '腾讯云' :
                                      cdn.includes('ali') ? '阿里云' :
                                      cdn.includes('hw')  ? '华为云' : cdn;
                        streams.push({ cdn: label, url: ensureHttps(url), type: 'flv' });
                    }
                } catch(e) {}
            }

            if (d0.data.hls_url && d0.data.hls_url.startsWith('http')) {
                streams.push({ cdn: 'HLS备用', url: ensureHttps(d0.data.hls_url), type: 'm3u8' });
            }

            if (!streams.length) {
                const fallback = d0.data.rtmp_url + '/' + d0.data.rtmp_live.replace(/&amp;/g, '&');
                streams.push({ cdn: '斗鱼', url: ensureHttps(fallback), type: 'flv' });
            }
            return { streams };
        } catch(e) {
            logStatus('❌ 斗鱼签名失败: ' + e.message);
            return null;
        }
    }

    // =======================================================

    let art = null;
    let lastRoomUrl = '';
    let savedVolume = 0.5;
    let savedMuted = true;
    let currentAnchorName = '';
    let currentPlatform = '';
    let currentAvatar = '';
    let danmakuEnabled = true;
    let currentTab = 'danmaku';
    let dmWs = null;
    let douyinWs = null;
    let dmConfig = null;
    let currentChatList = [];
    const CHAT_MAX = 300;
    let chatMessagesDiv = null;
    let followListDiv = null;
    let historyListDiv = null;
    let sortable = null;
    const HISTORY_MAX = 30;

    function _loadFollows() { try { return JSON.parse(localStorage.getItem('ps_follows') || '[]'); } catch(e) { return []; } }
    function _saveFollows(arr) { try { localStorage.setItem('ps_follows', JSON.stringify(arr.slice(0, 50))); } catch(e) {} }
    function _loadHistory() { try { return JSON.parse(localStorage.getItem('ps_history') || '[]'); } catch(e) { return []; } }
    function _saveHistory(arr) { try { localStorage.setItem('ps_history', JSON.stringify(arr.slice(0, HISTORY_MAX))); } catch(e) {} }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    function logStatus(msg) { console.log('[状态]', msg); }

    function loadVolumeMemory() {
        let vol = localStorage.getItem('ps_volume');
        if (vol !== null) { let v = parseFloat(vol); if (!isNaN(v) && v>=0 && v<=1) savedVolume = v; }
        let mut = localStorage.getItem('ps_muted');
        if (mut !== null) savedMuted = mut === 'true';
    }
    function saveVolumeMemory() { localStorage.setItem('ps_volume', savedVolume); localStorage.setItem('ps_muted', savedMuted); }

    function updatePageTitle(anchorName, platform) {
        const defaultNames = ['主播','虎牙主播','斗鱼主播','B站主播','抖音主播','直链','未知'];
        if (defaultNames.includes(anchorName) && platform === '虎牙' && lastRoomUrl) {
            const roomId = lastRoomUrl.split('/').pop().split('?')[0];
            anchorName = `房间 ${roomId}`;
        }
        const hasRealName = anchorName && !defaultNames.includes(anchorName) && !anchorName.includes('直链');
        if (hasRealName && platform && platform !== '未知') {
            document.title = platform + ' ' + anchorName;
        } else if (platform && platform !== '未知') {
            document.title = platform;
        } else if (anchorName && !defaultNames.includes(anchorName)) {
            document.title = anchorName;
        } else {
            document.title = '聚合直播';
        }
    }

    function getPlatformName(url) {
        if (url.includes('huya.com')) return '虎牙';
        if (url.includes('douyu.com')) return '斗鱼';
        if (url.includes('bilibili.com')) return 'B站';
        if (url.includes('douyin.com')) return '抖音';
        return '未知';
    }

    function addToHistory(url, name, platform, avatar) {
        if (!url) return;
        let history = _loadHistory().filter(item => item.url !== url);
        history.unshift({ url, name: name || url.split('/').pop().split('?')[0] || '未知', platform: platform || getPlatformName(url), avatar: avatar || '', time: Date.now() });
        if (history.length > HISTORY_MAX) history = history.slice(0, HISTORY_MAX);
        _saveHistory(history);
        renderHistoryList();
    }

    function renderHistoryList() {
        if (!historyListDiv) return;
        const items = _loadHistory();
        if (!items.length) { historyListDiv.innerHTML = '<div class="empty-chat">暂无播放历史</div>'; return; }
        let html = '';
        items.forEach(item => {
            let avatarHtml = item.avatar ? `<img class="history-avatar" src="${escapeHtml(item.avatar)}" alt="">` : '<div class="history-avatar"></div>';
            html += `<div class="history-item" data-url="${escapeHtml(item.url)}">${avatarHtml}<span class="history-info">${escapeHtml(item.platform + ' ' + item.name)}</span><span class="history-time">${formatTime(item.time)}</span></div>`;
        });
        historyListDiv.innerHTML = html;
    }

    function formatTime(timestamp) {
        const diff = Date.now() - timestamp;
        if (diff < 60000) return '刚刚';
        if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
        if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
        return new Date(timestamp).toLocaleDateString();
    }

    function playFromHistory(url) { document.getElementById('url').value = url; window.go(); }

    function updateFollowBtn(url) {
        const btn = document.getElementById('btn-fav');
        if (!btn) return;
        const isFollow = _loadFollows().some(x => x.url === url);
        btn.classList.toggle('fav-on', isFollow);
        btn.title = isFollow ? '取消关注' : '关注';
    }

    function renderFollowList() {
        if (!followListDiv) return;
        const items = _loadFollows();
        if (!items.length) {
            followListDiv.innerHTML = '<div class="empty-chat">暂无关注</div>';
            if (sortable) sortable.destroy();
            sortable = null;
            return;
        }
        let html = '';
        items.forEach((x, i) => {
            const statusText = x.status === 'online' ? '直播中' : '未开播';
            const avatarHtml = x.avatar ? `<img class="follow-avatar" src="${escapeHtml(x.avatar)}" alt="">` : '<div class="follow-avatar"></div>';
            html += `<div class="follow-item" data-id="${i}" data-url="${escapeHtml(x.url)}">${avatarHtml}<span class="follow-info">${escapeHtml(x.platform + ' ' + x.name)}</span><span class="follow-status ${x.status}">${statusText}</span><span class="follow-delete" data-del="${i}">✕</span></div>`;
        });
        followListDiv.innerHTML = html;
        if (sortable) sortable.destroy();
        sortable = new Sortable(followListDiv, { animation: 150, onEnd: () => {
            const newItems = [];
            followListDiv.querySelectorAll('.follow-item').forEach(el => newItems.push(items[parseInt(el.dataset.id)]));
            _saveFollows(newItems);
            renderFollowList();
        } });
    }

    function playFromFollows(url) { document.getElementById('url').value = url; window.go(); }

    async function refreshAllFollowStatus() {
        const items = _loadFollows();
        if (!items.length) return;
        for (let i = 0; i < items.length; i++) {
            const item = items[i];
            try {
                const r = await fetch(`${API_BASE}/api/parse?url=${encodeURIComponent(item.url)}`);
                if (r.status === 400) {
                    item.status = 'offline';
                    continue;
                }
                if (!r.ok) {
                    item.status = 'error';
                    continue;
                }
                const d = await r.json();
                if (d.error) {
                    item.status = 'error';
                } else if (d.client) {
                    if (item.url.includes('douyu.com')) {

    // ==================== 斗鱼弹幕 ====================
    function startDouyuDanmaku(roomId) {
        if (!danmakuEnabled || !roomId) return;
        if (dmWs) { try { dmWs.close(); } catch(e){} dmWs = null; }
        function enc(payload) {
            const body = new TextEncoder().encode(payload);
            const PackLen = body.length + 9;
            const buf = new ArrayBuffer(body.length + 13);
            const v = new DataView(buf);
            v.setUint32(0, PackLen, true); v.setUint32(4, PackLen, true);
            v.setUint16(8, 689, true); v.setUint8(10, 0); v.setUint8(11, 0);
            new Uint8Array(buf, 12).set(body);
            v.setUint8(12 + body.length, 0);
            return buf;
        }
        function parseSTT(s) {
            const r = {};
            s.split('/').forEach(p => {
                const i = p.indexOf('@=');
                if (i >= 0) r[p.slice(0,i)] = p.slice(i+2).replace(/@S/g,'/').replace(/@A/g,'@');
            });
            return r;
        }
        const ws = new WebSocket('wss://danmuproxy.douyu.com:8506/');
        ws.binaryType = 'arraybuffer';
        dmWs = ws;
        ws.onopen = () => {
            ws.send(enc(`type@=loginreq/roomid@=${roomId}/ver@=20190610/aver@=218101901/ct@=0/`));
            ws.send(enc(`type@=joingroup/rid@=${roomId}/gid@=-9999/`));
            setInterval(() => { if (ws.readyState === 1) ws.send(enc('type@=mrkl/')); }, 45000);
        };
        ws.onmessage = (e) => {
            const data = new Uint8Array(e.data);
            let offset = 0;
            while (offset + 13 <= data.length) {
                const v = new DataView(data.buffer, data.byteOffset + offset);
                const packLen = v.getUint32(0, true);
                if (packLen < 9 || offset + 4 + packLen > data.length) break;
                const body = new TextDecoder('utf-8', {fatal:false}).decode(data.slice(offset+12, offset+4+packLen-1));
                const msg = parseSTT(body);
                if (msg.type === 'chatmsg' && msg.txt) {
                    const nick = msg.nn || '匿名用户';
                    const txt = msg.txt.replace(/@S/g, '/').replace(/@A/g, '@');
                    addChatMessage(nick, txt);
                }
                offset += 4 + packLen;
            }
        };
        ws.onclose = () => { if (dmWs === ws && danmakuEnabled) setTimeout(() => startDouyuDanmaku(roomId), 3000); };
    }

    // ==================== 虎牙弹幕（Tars） ====================
    function tarsReader(ab) {
        const buf = ab instanceof Uint8Array ? ab : new Uint8Array(ab);
        let pos = 0;
        function readHead() {
            if (pos >= buf.length) return null;
            let b = buf[pos++];
            let tag = (b >> 4) & 0xF;
            let type = b & 0xF;
            if (tag === 15) {
                if (pos >= buf.length) return null;
                tag = buf[pos++];
            }
            return { tag, type };
        }
        function readRawInt() {
            const h = readHead();
            if (!h) return 0;
            switch (h.type) {
                case 12: return 0;
                case 0: return buf[pos++];
                case 1: return (buf[pos++] << 8) | buf[pos++];
                case 2: return (buf[pos++] << 24) | (buf[pos++] << 16) | (buf[pos++] << 8) | buf[pos++];
                case 3: {
                    const hi = (buf[pos++] << 24) | (buf[pos++] << 16) | (buf[pos++] << 8) | buf[pos++];
                    const lo = (buf[pos++] << 24) | (buf[pos++] << 16) | (buf[pos++] << 8) | buf[pos++];
                    return hi * 4294967296 + (lo >>> 0);
                }
                default: return 0;
            }
        }
        function skipField(type) {
            switch (type) {
                case 0: pos++; break;
                case 1: pos += 2; break;
                case 2: pos += 4; break;
                case 3: pos += 8; break;
                case 4: pos += 4; break;
                case 5: pos += 8; break;
                case 6: pos += buf[pos] + 1; break;
                case 7: {
                    const len = (buf[pos] << 24) | (buf[pos+1] << 16) | (buf[pos+2] << 8) | buf[pos+3];
                    pos += 4 + len;
                    break;
                }
                case 8: {
                    const n = readRawInt();
                    for (let i = 0; i < 2 * n; i++) {
                        const h = readHead();
                        if (h) skipField(h.type);
                    }
                    break;
                }
                case 9: {
                    const n = readRawInt();
                    for (let i = 0; i < n; i++) {
                        const h = readHead();
                        if (h) skipField(h.type);
                    }
                    break;
                }
                case 10: skipToStructEnd(); break;
                case 11: break;
                case 12: break;
                case 13: readHead(); const l = readRawInt(); pos += l; break;
            }
        }
        function skipToStructEnd() {
            while (pos < buf.length) {
                const h = readHead();
                if (!h) break;
                if (h.type === 11) return;
                skipField(h.type);
            }
        }
        function skipToTag(targetTag) {
            while (pos < buf.length) {
                const saved = pos;
                const h = readHead();
                if (!h) return null;
                if (h.tag === targetTag) return h;
                if (h.tag > targetTag || h.type === 11) {
                    pos = saved;
                    return null;
                }
                skipField(h.type);
            }
            return null;
        }
        function readInt(tag) {
            const h = skipToTag(tag);
            if (!h) return 0;
            switch (h.type) {
                case 12: return 0;
                case 0: return buf[pos++];
                case 1: return (buf[pos++] << 8) | buf[pos++];
                case 2: return (buf[pos++] << 24) | (buf[pos++] << 16) | (buf[pos++] << 8) | buf[pos++];
                default: skipField(h.type); return 0;
            }
        }
        function readBytes(tag) {
            const h = skipToTag(tag);
            if (!h) return null;
            if (h.type !== 13) { skipField(h.type); return null; }
            readHead();
            const n = readRawInt();
            const bytes = buf.slice(pos, pos + n);
            pos += n;
            return bytes;
        }
        function readString(tag) {
            const h = skipToTag(tag);
            if (!h) return '';
            let len;
            if (h.type === 6) {
                len = buf[pos++];
            } else if (h.type === 7) {
                len = (buf[pos] << 24) | (buf[pos+1] << 16) | (buf[pos+2] << 8) | buf[pos+3];
                pos += 4;
            } else {
                skipField(h.type);
                return '';
            }
            const s = new TextDecoder().decode(buf.slice(pos, pos + len));
            pos += len;
            return s;
        }
        function readStructBegin(tag) {
            const h = skipToTag(tag);
            return h && h.type === 10;
        }
        return { readInt, readBytes, readString, readStructBegin, skipToStructEnd };
    }

    function parseHuyaMsg(data) {
        const r = tarsReader(data.buffer || data);
        if (r.readInt(0) !== 7) return;
        const vData = r.readBytes(1);
        if (!vData || !vData.length) return;
        const r2 = tarsReader(vData);
        r2.readInt(0);
        if (r2.readInt(1) !== 1400) return;
        const sMsg = r2.readBytes(2);
        let nick = r2.readString(4) || '虎牙网友';
        if (!sMsg || !sMsg.length) return;
        const r3 = tarsReader(sMsg);
        if (nick === '虎牙网友' && r3.readStructBegin(0)) {
            r3.readInt(0);
            r3.readInt(1);
            const innerNick = r3.readString(2);
            if (innerNick) nick = innerNick;
            r3.skipToStructEnd();
        }
        const sContent = r3.readString(3);
        if (sContent) addChatMessage(nick, sContent);
    }

    function startHuyaDanmaku(config) {
        if (!config || !config.ayyuid) return;
        const { ayyuid, topSid, subSid } = config;
        function tarsOut() {
            const bytes = [];
            function wHead(tag, type) {
                if (tag < 15) bytes.push((tag << 4) | type);
                else { bytes.push(0xF0 | type); bytes.push(tag); }
            }
            function wInt8(tag, v) {
                if (v === 0) wHead(tag, 12);
                else { wHead(tag, 0); bytes.push(v & 0xFF); }
            }
            function wInt16(tag, v) {
                if (v >= -128 && v <= 127) wInt8(tag, v);
                else { wHead(tag, 1); bytes.push((v >> 8) & 0xFF, v & 0xFF); }
            }
            function wInt32(tag, v) {
                if (v >= -32768 && v <= 32767) wInt16(tag, v);
                else { wHead(tag, 2); bytes.push((v >> 24) & 0xFF, (v >> 16) & 0xFF, (v >> 8) & 0xFF, v & 0xFF); }
            }
            function wInt64(tag, v) {
                if (v >= -2147483648 && v <= 2147483647) wInt32(tag, v);
                else {
                    wHead(tag, 3);
                    const hi = Math.floor(v / 0x100000000);
                    const lo = v >>> 0;
                    bytes.push((hi >> 24) & 0xFF, (hi >> 16) & 0xFF, (hi >> 8) & 0xFF, hi & 0xFF,
                               (lo >> 24) & 0xFF, (lo >> 16) & 0xFF, (lo >> 8) & 0xFF, lo & 0xFF);
                }
            }
            function wBool(tag, v) { wInt8(tag, v ? 1 : 0); }
            function wStr(tag, s) {
                const b = new TextEncoder().encode(s);
                if (b.length <= 255) { wHead(tag, 6); bytes.push(b.length); }
                else { wHead(tag, 7); const l = b.length; bytes.push((l >> 24) & 0xFF, (l >> 16) & 0xFF, (l >> 8) & 0xFF, l & 0xFF); }
                for (let i = 0; i < b.length; i++) bytes.push(b[i]);
            }
            function wBytes(tag, inner) {
                wHead(tag, 13);
                wHead(0, 0);
                wInt32(0, inner.length);
                for (let i = 0; i < inner.length; i++) bytes.push(inner[i]);
            }
            return { wInt64, wBool, wStr, wBytes, get: () => bytes };
        }
        function buildRegister() {
            const oos = tarsOut();
            oos.wInt64(0, ayyuid);
            oos.wBool(1, ayyuid === 0);
            oos.wStr(2, 'web_' + Date.now());
            oos.wStr(3, '');
            oos.wInt64(4, topSid);
            oos.wInt64(5, subSid);
            oos.wInt64(6, ayyuid);
            oos.wInt64(7, 3);
            const wscmd = tarsOut();
            wscmd.wInt64(0, 1);
            wscmd.wBytes(1, oos.get());
            return new Uint8Array(wscmd.get()).buffer;
        }
        const HB = Uint8Array.from(atob('ABQdAAwsNgBM'), c => c.charCodeAt(0));
        const ws = new WebSocket('wss://cdnws.api.huya.com');
        ws.binaryType = 'arraybuffer';
        dmWs = ws;
        ws.onopen = () => {
            ws.send(buildRegister());
            setInterval(() => { if (ws.readyState === 1) ws.send(HB); }, 60000);
        };
        ws.onmessage = (e) => { try { parseHuyaMsg(new Uint8Array(e.data)); } catch(err) {} };
        ws.onclose = () => { if (dmWs === ws && danmakuEnabled) setTimeout(() => startHuyaDanmaku(config), 3000); };
    }

function startDouyinDanmaku(roomId) {

    function ensureHttps(url) {
        if (!url) return url;
        if (url.startsWith('https://')) return url;
        if (url.startsWith('http://')) return url.replace('http://', 'https://');
        return url;
    }

    async function goWithUrl(raw) {
        if (!raw) return;
        setBtn(true);
        logStatus('处理中…');
        const isCDN = /\.flv[?#]|\.flv$|\.m3u8[?#]|\.m3u8$/.test(raw) || /flv\.huya\.com|hls\.huya\.com|bilivideo\.com|douyucdn\.cn/.test(raw);
        lastRoomUrl = isCDN ? '' : raw;
        currentPlatform = getPlatformName(raw);
        let streams = null;
        if (!isCDN && (raw.includes('huya.com') || raw.includes('douyu.com') || raw.includes('bilibili.com') || raw.includes('douyin.com'))) {
            try {
                const resp = await fetch(`${API_BASE}/api/parse?url=${encodeURIComponent(raw)}`);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();
                if (data.error) throw new Error(data.error);
                if (data.client) {
                    if (raw.includes('douyu.com')) {
                        const cd = await douyuSignAndPlay(data.roomId, data.crptext);
                        if (!cd) throw new Error('斗鱼签名失败');
                        streams = cd.streams;
                        currentAnchorName = data.anchorName || data.roomName || '斗鱼主播';
                        currentAvatar = data.avatar || '';
                        currentPlatform = '斗鱼';
                    } else {
                        throw new Error('后端返回 client 模式但非斗鱼，暂不支持');
                    }
                } else if (data.streams && data.streams.length) {
                    streams = data.streams.map(s => ({ ...s, url: ensureHttps(s.url) }));
                    currentAnchorName = data.title || raw.split('/').pop().split('?')[0] || '主播';
                    currentAvatar = data.avatar || '';
                    dmConfig = data.danmaku || null;
                    if (raw.includes('douyin.com') && data.roomId) {
                        window._douyinRoomId = data.roomId;
                    }
                } else {
                    throw new Error('未获取到流地址');
                }
            } catch(e) {
                logStatus('❌ ' + e.message);
                setBtn(false);
                return;
            }
        } else if (isCDN) {
            const fileName = raw.split('/').pop().split('?')[0] || '直链';
            streams = [{ cdn: '直链', url: ensureHttps(raw), type: raw.includes('.m3u8') ? 'm3u8' : 'flv' }];
            currentAnchorName = fileName;
            currentAvatar = '';
            currentPlatform = '直链';
            dmConfig = null;
        } else {
            logStatus('❌ 不支持的链接，请提供直播间地址或直链');
            setBtn(false);
            return;
        }
        updatePageTitle(currentAnchorName, currentPlatform);
        addToHistory(raw, currentAnchorName, currentPlatform, currentAvatar);
        playStream(streams);
        setBtn(false);
    }

    function playStream(streams) {
        if (art) { try { art.destroy(true); } catch(e){} art = null; }
        if (window._hlsInst) { try { window._hlsInst.destroy(); } catch(e){} window._hlsInst = null; }
        document.getElementById('player').innerHTML = '';
        const s0 = streams[0];
        const artType = s0.type === 'flv' ? 'flv' : (s0.type === 'm3u8' ? 'm3u8' : '');
        const qualityList = streams.length > 1 ? streams.map((s, i) => ({ default: i === 0, html: s.cdn, url: s.url, type: s.type || '' })) : [];
        art = new Artplayer({
            container: '#player',
            url: s0.url,
            type: artType,
            isLive: true,
            autoplay: true,
            muted: savedMuted,
            volume: savedVolume,
            setting: false,
            pip: true,
            screenshot: false,
            playbackRate: false,
            aspectRatio: false,
            fullscreenWeb: true,
            lang: 'zh-cn',
            quality: qualityList,
            customType: {
                flv: function(video, url) {
                    if (video._mpegts) {
                        try { video._mpegts.unload(); video._mpegts.detachMediaElement(); video._mpegts.destroy(); } catch(e){}
                        video._mpegts = null;
                    }
                    const player = mpegts.createPlayer({ type: 'flv', url: url, isLive: true }, {
                        enableWorker: true,
                        enableStashBuffer: false,
                        stashInitialSize: 128,
                        liveBufferLatencyChasing: true,
                        liveBufferLatencyMaxLatency: 4.0,
                        liveBufferLatencyMinRemain: 0.5,
                        autoCleanupSourceBuffer: true,
                        autoCleanupMaxBackwardDuration: 10,
                        autoCleanupMinBackwardDuration: 5,
                        lazyLoad: false,
                        lazyLoadMaxDuration: 3 * 60,
                        lazyLoadRecoverDuration: 30,
                        reconnectInterval: 5,
                        reconnectAttempts: 3,
                        fixAudioTimestampGap: false
                    });
                    player.attachMediaElement(video);
                    player.load();
                    video._mpegts = player;

                    let lastTime = -1, stallCount = 0;
                    const stallTimer = setInterval(() => {
                        if (!art || !video) { clearInterval(stallTimer); return; }
                        const ct = video.currentTime;
                        if (ct === lastTime && !video.paused && !video.ended) {
                            stallCount++;
                            if (stallCount >= 2) {
                                clearInterval(stallTimer);
                                console.warn('[flv] 卡顿检测触发，尝试切 CDN');
                                const curQ = art.quality;
                                const nxt = art.qualityList && art.qualityList.find(q => q.html !== (curQ && curQ.html));
                                if (nxt) art.switchQuality(nxt);
                                else if (lastRoomUrl) setTimeout(() => goWithUrl(lastRoomUrl), 500);
                            }
                        } else { stallCount = 0; }
                        lastTime = ct;
                    }, 2500);

                    video.addEventListener('ended', function onFlvEnded() {
                        if (!lastRoomUrl) return;
                        console.warn('[flv] 流已结束(onSourceEnded)，token可能过期，1秒后重新解析...');
                        clearInterval(stallTimer);
                        setTimeout(() => { if (lastRoomUrl) goWithUrl(lastRoomUrl); }, 1000);
                    });

                    player.on(mpegts.Events.ERROR, (err) => {
                        if (err.type === 'fatal' && art && lastRoomUrl) {
                            console.warn('[flv] 致命错误，尝试切 CDN', err);
                            clearInterval(stallTimer);
                            const curQ = art.quality;
                            const nxt = art.qualityList && art.qualityList.find(q => q.html !== (curQ && curQ.html));
                            if (nxt) art.switchQuality(nxt);
                            else setTimeout(() => goWithUrl(lastRoomUrl), 1000);
                        }
                    });
                },
                m3u8: function(video, url) {
                    if (window._hlsInst) { try { window._hlsInst.destroy(); } catch(e){} window._hlsInst = null; }
                    if (video._mpegts) { try { video._mpegts.unload(); video._mpegts.detachMediaElement(); video._mpegts.destroy(); } catch(e){} video._mpegts = null; }
                    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                        const hls = new Hls({
                            liveSyncDurationCount: 2,
                            liveMaxLatencyDurationCount: 5,
                            lowLatencyMode: true,
                            maxBufferLength: 8,
                            maxMaxBufferLength: 16
                        });
                        hls.loadSource(url);
                        hls.attachMedia(video);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                        hls.on(Hls.Events.ERROR, (e, data) => {
                            if (data.fatal) {
                                console.warn('[hls] 致命错误', data.type, data.details);
                                hls.destroy();
                                window._hlsInst = null;
                            }
                        });
                        window._hlsInst = hls;
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = url;
                        video.play();
                    } else {
                        console.error('当前浏览器不支持 HLS 播放');
                    }
                }
            }
        });
        function adjustPlayerRatio() {
            const container = document.getElementById('player-container');
            const wrap = document.getElementById('player-wrap');
            if (!container || !wrap) return;
            const cw = container.clientWidth;
            const ch = container.clientHeight;
            if (cw / ch > 16 / 9) {
                wrap.style.width = Math.floor(ch * 16 / 9) + 'px';
                wrap.style.height = ch + 'px';
            } else {
                wrap.style.width = cw + 'px';
                wrap.style.height = Math.floor(cw * 9 / 16) + 'px';
            }
        }
        window.addEventListener('resize', adjustPlayerRatio);
        adjustPlayerRatio();

        art.on('ready', () => {
            adjustPlayerRatio();
            logStatus('▶ ' + s0.cdn + ' · ' + s0.type.toUpperCase());
            updateFollowBtn(lastRoomUrl);
            if (dmWs) { try { dmWs.close(); } catch(e){} dmWs = null; }
            if (douyinWs) { try { douyinWs.close(); } catch(e){} douyinWs = null; }

            if (lastRoomUrl && lastRoomUrl.includes('douyu.com')) {
                const roomId = lastRoomUrl.split('/').pop().split('?')[0];
                startDouyuDanmaku(roomId);
            } else if (dmConfig && dmConfig.platform === 'huya') {
                startHuyaDanmaku(dmConfig);
            } else if (lastRoomUrl && lastRoomUrl.includes('douyin.com')) {
                const roomId = window._douyinRoomId || lastRoomUrl.split('/').pop().split('?')[0];
                startDouyinDanmaku(roomId);
            }
        });
        art.on('video:volumechange', () => {
            if (art) { savedVolume = art.volume; savedMuted = art.muted; saveVolumeMemory(); }
        });
        art.on('quality', (q) => {
            if (!q) return;
            logStatus('▶ ' + q.html + ' · ' + (q.type || '').toUpperCase());
            if (window._hlsInst) { try { window._hlsInst.destroy(); } catch(e){} window._hlsInst = null; }
            if (art?.video?._mpegts) {
                try { art.video._mpegts.unload(); art.video._mpegts.detachMediaElement(); art.video._mpegts.destroy(); } catch(e){}
                art.video._mpegts = null;
            }
        });
    }

    document.addEventListener('visibilitychange', () => {
        if (!document.hidden && art && art.playing) {
            const video = art.video;
            if (video) {
                const currentTime = video.currentTime;
                video.currentTime = currentTime;
            }
        }
    });

    function setBtn(loading) {
        const btn = document.getElementById('btn-play');
        if (btn) { btn.disabled = loading; btn.textContent = loading ? '…' : '播放'; }
    }

    function initTabs() {
        const btns = document.querySelectorAll('.bar-tab');
        const headerTitle = document.getElementById('header-title');
        const headerAction = document.getElementById('header-action');
        const dmSwitch = document.getElementById('danmaku-switch');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                if (tab === currentTab) return;
                currentTab = tab;
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (tab === 'danmaku') {
                    headerTitle.innerText = '弹幕列表';
                    dmSwitch.style.display = 'flex';
                    headerAction.style.display = 'none';
                    chatMessagesDiv.style.display = danmakuEnabled ? 'flex' : 'none';
                    followListDiv.style.display = 'none';
                    historyListDiv.style.display = 'none';
                    renderChatMessages();
                } else if (tab === 'follow') {
                    headerTitle.innerText = '关注列表';
                    dmSwitch.style.display = 'none';
                    headerAction.style.display = 'block';
                    headerAction.innerText = '刷新';
                    headerAction.onclick = () => refreshAllFollowStatus();
                    chatMessagesDiv.style.display = 'none';
                    followListDiv.style.display = 'flex';
                    historyListDiv.style.display = 'none';
                    renderFollowList();
                } else if (tab === 'history') {
                    headerTitle.innerText = '播放历史';
                    dmSwitch.style.display = 'none';
                    headerAction.style.display = 'none';
                    chatMessagesDiv.style.display = 'none';
                    followListDiv.style.display = 'none';
                    historyListDiv.style.display = 'flex';
                    renderHistoryList();
                }
            });
        });
    }

    function initDanmakuSwitch() {
        const icon = document.getElementById('dm-switch-icon');
        if (icon) {
            icon.addEventListener('click', () => {
                danmakuEnabled = !danmakuEnabled;
                icon.textContent = danmakuEnabled ? '🔊' : '🔇';
                icon.title = danmakuEnabled ? '关闭弹幕' : '开启弹幕';
                if (!danmakuEnabled) {
                    if (dmWs) { try { dmWs.close(); } catch(e){} dmWs = null; }
                    if (douyinWs) { try { douyinWs.close(); } catch(e){} douyinWs = null; }
                } else {
                    if (lastRoomUrl && lastRoomUrl.includes('douyu.com')) {
                        const roomId = lastRoomUrl.split('/').pop().split('?')[0];
                        startDouyuDanmaku(roomId);
                    } else if (dmConfig && dmConfig.platform === 'huya') {
                        startHuyaDanmaku(dmConfig);
                    } else if (lastRoomUrl && lastRoomUrl.includes('douyin.com')) {
                        const roomId = window._douyinRoomId || lastRoomUrl.split('/').pop().split('?')[0];
                        startDouyinDanmaku(roomId);
                    }
                }
                if (currentTab === 'danmaku') {
                    chatMessagesDiv.style.display = danmakuEnabled ? 'flex' : 'none';
                    if (danmakuEnabled) renderChatMessages();
                }
            });
        }
    }

    window.go = () => { const url = document.getElementById('url').value.trim(); if (url) goWithUrl(url); };
    window.toggleFollow = () => {
        const url = document.getElementById('url').value.trim() || lastRoomUrl;
        if (!url) { logStatus('请先输入或播放一个直播间'); return; }
        const follows = _loadFollows();
        const idx = follows.findIndex(x => x.url === url);
        if (idx >= 0) {
            follows.splice(idx, 1);
            logStatus('已取消关注');
        } else {
            let name = currentAnchorName;
            let platform = currentPlatform;
            let avatar = currentAvatar;
            const defaultNames = ['主播','虎牙主播','斗鱼主播','B站主播','抖音主播','直链'];
            if (!name || defaultNames.includes(name)) {
                const defaultName = url.split('/').pop().split('?')[0] || '主播';
                const customName = prompt('请输入该主播的备注名', defaultName);
                if (customName === null) return;
                name = customName.trim() || defaultName;
                platform = getPlatformName(url);
                avatar = '';
            }
            follows.unshift({ url, name, platform, status: 'unknown', t: Date.now(), avatar: avatar || '' });
            logStatus('已关注 ' + name);
        }
        _saveFollows(follows);
        updateFollowBtn(url);
        renderFollowList();
    };
    window.openOriginalUrl = () => { if (lastRoomUrl) window.open(lastRoomUrl, '_blank'); else logStatus('当前播放的不是直播间地址'); };

    function init() {
        chatMessagesDiv = document.getElementById('chat-messages');
        followListDiv = document.getElementById('follow-list');
        historyListDiv = document.getElementById('history-list');
        loadVolumeMemory();
        initTabs();
        initDanmakuSwitch();

        // ----- 关注列表：中键新标签，左键播放，删除 -----
        followListDiv.addEventListener('auxclick', (e) => {
            if (e.button !== 1) return;
            const item = e.target.closest('.follow-item');
            if (!item || !item.dataset.url) return;
            e.preventDefault();
            e.stopPropagation();
            const newUrl = window.location.origin + window.location.pathname + '?url=' + encodeURIComponent(item.dataset.url);
            console.log('[中键] 关注列表打开新标签:', newUrl);
            window.open(newUrl, '_blank');
        }, true);

        followListDiv.addEventListener('click', (e) => {
            if (e.button !== 0) return;
            const del = e.target.closest('[data-del]');
            if (del) {
                const idx = parseInt(del.dataset.del);
                const arr = _loadFollows();
                arr.splice(idx, 1);
                _saveFollows(arr);
                renderFollowList();
                updateFollowBtn(lastRoomUrl);
                return;
            }
            const item = e.target.closest('.follow-item');
            if (item && item.dataset.url) {
                playFromFollows(item.dataset.url);
            }
        });

        followListDiv.addEventListener('mousedown', (e) => {
            if (e.button === 1) {
                e.preventDefault();
            }
        });

        // ----- 历史列表：中键新标签，左键播放 -----
        historyListDiv.addEventListener('auxclick', (e) => {
            if (e.button !== 1) return;
            const item = e.target.closest('.history-item');
            if (!item || !item.dataset.url) return;
            e.preventDefault();
            e.stopPropagation();
            const newUrl = window.location.origin + window.location.pathname + '?url=' + encodeURIComponent(item.dataset.url);
            console.log('[中键] 历史列表打开新标签:', newUrl);
            window.open(newUrl, '_blank');
        }, true);

        historyListDiv.addEventListener('click', (e) => {
            if (e.button !== 0) return;
            const item = e.target.closest('.history-item');
            if (item && item.dataset.url) {
                playFromHistory(item.dataset.url);
            }
        });

        historyListDiv.addEventListener('mousedown', (e) => {
            if (e.button === 1) {
                e.preventDefault();
            }
        });

        renderFollowList();
        renderHistoryList();
        const urlInput = document.getElementById('url');
        urlInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') window.go(); });
        const urlParams = new URLSearchParams(window.location.search);
        const autoUrl = urlParams.get('url');
        if (autoUrl) { document.getElementById('url').value = autoUrl; window.go(); }
        setInterval(() => refreshAllFollowStatus(), 5 * 60 * 1000);
        refreshAllFollowStatus();
    }
    init();
</script>
</body>
</html>
